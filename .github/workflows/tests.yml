name: unit tests

on:
  push:
    pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    defualts:
      run:
        working-directory: backend

    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: install dep
        run: |
          python -m pip install --upgrade pip
          pip install -r main/requirments.txt
          pip install pytest

      - name: run tests
        run: pytest -v tests


    
