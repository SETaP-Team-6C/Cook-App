<svg xmlns="http://www.w3.org/2000/svg" width="900" height="380" viewBox="0 0 900 380">
  <defs>
    <style>
      .box { fill: #fff; stroke: #334155; stroke-width: 1.5; rx: 8; }
      .text { font-family: Arial, Helvetica, sans-serif; fill: #0f172a; font-size: 13px }
      .title { font-weight: 700; font-size: 16px }
      .arrow { stroke: #0f172a; stroke-width: 1.2; marker-end: url(#arrowhead); fill: none }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0f172a" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="20" y="28" class="text title">Cook App - Frontend Architecture</text>

  <!-- Browser / UI -->
  <rect x="20" y="50" width="220" height="80" class="box" />
  <text x="40" y="78" class="text">Flutter UI (mobile / desktop)</text>
  <text x="40" y="98" class="text">Pages: Login, Home, Search, View</text>

  <!-- API Services -->
  <rect x="340" y="50" width="240" height="120" class="box" />
  <text x="360" y="78" class="text">HTTP Services</text>
  <text x="360" y="98" class="text">LoginService, CreateService</text>
  <text x="360" y="116" class="text">RecipeService, SearchService, ViewService</text>

  <!-- Backend -->
  <rect x="660" y="50" width="220" height="120" class="box" />
  <text x="680" y="78" class="text">Backend (Flask/FastAPI)</text>
  <text x="680" y="98" class="text">Endpoints: /authenticate, /get-recipes</text>
  <text x="680" y="116" class="text">/add-recipe, /view-recipe, /search-recipe</text>

  <!-- Arrows -->
  <path d="M 240 90 L 340 90" class="arrow" />
  <path d="M 580 90 L 660 90" class="arrow" />

  <!-- Session store -->
  <rect x="340" y="200" width="220" height="80" class="box" />
  <text x="360" y="225" class="text">Local Session</text>
  <text x="360" y="245" class="text">Session.userId</text>

  <path d="M 200 130 L 400 220" class="arrow" />
  <path d="M 460 220 L 660 130" class="arrow" />

  <!-- Footer note -->
  <text x="20" y="360" class="text">Diagram: front-end components and HTTP communication to backend. Images are illustrative.</text>
</svg>